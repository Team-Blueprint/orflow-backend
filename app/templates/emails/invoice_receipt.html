<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Payment Receipt</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #4CAF50;">Payment Receipt</h2>
        <p>Hi <strong>{{ customer_name }}</strong>,</p>
        <p>Thank you for your payment!</p>
        
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px; margin-bottom: 20px;">
            <tr>
                <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Invoice ID:</strong></td>
                <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ invoice_id }}</td>
            </tr>
            <tr>
                <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Amount Paid:</strong></td>
                <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ currency }} {{ amount_formatted }}</td>
            </tr>
            <tr>
                <td style="padding: 8px; border-bottom: 1px solid #ddd;"><strong>Date Paid:</strong></td>
                <td style="padding: 8px; border-bottom: 1px solid #ddd;">{{ paid_at_str }}</td>
            </tr>
        </table>
        
        <p>If you have any questions, feel free to reply to this email.</p>
        <p>Thanks,<br><strong>Orflow Team</strong></p>
    </div>
</body>
</html>
